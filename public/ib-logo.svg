<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="textGradLight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0284c7" />
      <stop offset="100%" style="stop-color:#7c3aed" />
    </linearGradient>
    <linearGradient id="textGradDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#34d399" />
      <stop offset="100%" style="stop-color:#60a5fa" />
    </linearGradient>
    <style>
      .bg { fill: #f8fafc; stroke: rgba(15, 23, 42, 0.1); stroke-width: 2; }
      .text { fill: url(#textGradLight); font-family: 'Inter', system-ui, sans-serif; font-weight: bold; font-size: 40px; text-anchor: middle; dominant-baseline: central; }
      @media (prefers-color-scheme: dark) {
        .bg { fill: #0f172a; stroke: rgba(255, 255, 255, 0.15); stroke-width: 2; }
        .text { fill: url(#textGradDark); }
      }
    </style>
  </defs>
  <rect x="5" y="5" width="90" height="90" rx="30" ry="30" class="bg" />
  <text x="50" y="52" class="text">IB</text>
</svg>
